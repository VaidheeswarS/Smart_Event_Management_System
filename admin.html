<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Document</title>
        
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <style>
   
            body{
                margin: 0;
                padding: 0;
                height: 100%;
                /* background-color: rgb(156, 249, 218); */
                position: relative;
            }

            #main-container{
                
                background-color: white;
                display: flex;
                flex-direction: column;
                height: 100vh; 


            }

            #div-1{
                flex: 1;
                background-color:rgb(28, 154, 173);
            }

            #div-2{
                flex: 5;
                background-color: white;
                overflow: scroll;
                padding: 20px;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                overflow-y: auto;     /* vertical scroll */
                overflow-x: auto; 
               
            }

            
            header{
                flex: 0.5;
                background:white;
                /* height: 40px; */
                padding: 10px 20px;
                color: rgb(28, 154, 173);
                display: flex;
                justify-content: space-around;
                align-items: center;
            }

            #container{
                list-style: none;
                width: 350px;
                display: flex;  
                margin: 0;
                padding: 0;
                align-items: center;
                border: 1px solid;
                background-color: white;
                border-radius: 5px;
            }

            #container > li{
                text-align: center;
                flex: 1;
                position: relative;
                /* height: 25px; */
                padding-top: 10px;
                padding-bottom: 10px;
                cursor: pointer;

            }
            #container > li:hover{
                background-color: rgb(28,154,173);
                color: white;
                
            }

            #container li a{
                text-decoration: none;
                color: rgb(28, 154, 173);
                font-size: 15px;
                padding: 10px 14px;
                display: block;
                transition: 0.3s;
            }

            #container li a:hover{
                background: rgba(255,255,255,0.15);
                border-radius: 5px;
            }

            #content-1, #content-2{
                padding: 0;
                position: absolute;
                top: 100%;
                left: 0;
                background: white;
                min-width: 160px;
                display: none;
                flex-direction: column;
                border-radius: 6px;
                overflow: hidden;
                box-shadow: 0 5px 12px rgba(0,0,0,0.1);
                z-index: 100;
            }

            #content-1 li, #content-2 li{
                list-style: none;
            }
            
            #content-2 li i{
                color: rgb(28, 154, 173);
                font-size: medium;
             }

            #content-1 li , #content-2 li a, #logout, #profile{
                color: #333;
                padding: 10px;
                display: block;
                font-size: 14px;
            }

            #content-1 li:hover,
            #content-2 li:hover{
                background: rgba(28, 154, 173, 0.1);
            }

            #li-1:hover #content-1{
                display: block;
            }

            #container li:hover #content-2{
                display: block;
            }

            #container i{
                margin-left: 5px;
                font-size: 12px;
            }
           
            #div-2 table {
                position: absolute;
                /* top: 50px; */
                width: 80%;
                border-collapse: collapse;
                background: white;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            }

            #div-2 th {
                background: rgb(28, 154, 173);
                color: white;
                padding: 12px;
                text-align: left;
                font-size: 15px;
            }

            #div-2 td {
                padding: 12px;
                border-bottom: 1px solid #eee;
                font-size: 14px;
            }

            #div-2 tr:nth-child(even) {
                background: #f9f9f9;
            }

            #div-2 tr:hover {
                background: rgba(28, 154, 173, 0.1);
            }

            #div-2 input {
                width: 100%;
                padding: 6px;
                border-radius: 6px;
                border: 1px solid #ccc;
                outline: none;
            }

            #div-2 button {
                padding: 6px 12px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
                transition: 0.3s;
            }

            #div-2 button {
                background: rgb(28, 154, 173);
                color: white;
            }

            #div-2 button:hover {
                background: rgb(20, 120, 135);
            }

            #div-2 td button {
                background:rgba(251, 56, 95, 0.847);
            }

            #div-2 td button:hover {
                background: rgb(247, 11, 58);
            }


            
            #div-2 #addevents-form {
                position: absolute;
                margin-top: 7px;
                background-color: transparent;
                padding: 30px 40px;
                border-radius: 12px;
                width: 350px;
                border-width: 5px;
                box-shadow: 0 0 10px rgb(28, 154, 173);
                backdrop-filter: blur(20px);
            }

            #div-2 #addevents-form label {
                display: block;
                margin-top: 12px;
                font-weight: 600;
                color: rgb(28, 154, 173);
            }
            #div-2 #addevents-form input,  #div-2 #addevents-form select {
                width: 100%;
                padding: 7px;
                margin-top: 5px;
                background-color: rgb(28, 154, 173);
                border-radius: 8px;
                border: 1px solid rgb(28, 154, 173);
                outline: none;
                color:white;
                box-sizing: border-box;   
                /* height: 40px;             */
                transition: 0.3s;
            }

            #div-2 #addevents-form input[type="file"] {
                height: auto;        
                padding: 6px;
                background-color: transparent;
            }

            #div-2 #addevents-form input:focus, #div-2 #addevents-form select:focus {
                border-color: white;
                /* box-shadow: 0 0 5px white; */
                color: white;
            }


            #div-2 #addevents-form #submit {
                margin-top: 20px;
                margin-left: 260px;
                background: rgb(28, 154, 173);
                color: white;
                width: 25%;
                border: none;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            #div-2 #addevents-form #submit:hover {
                border: 2px solid;
                border-color: rgb(28, 154, 173);
                background-color: white;
                color: rgb(28, 154, 173);
                transform: scale(1.05);
            }
            /* #div-2 #viewevents-form {
                display: flex;
                flex-direction: row;
                justify-content: center;
            } */

            #div-2 #viewevents-form table{
                position: absolute;
                left: 55px;
                width: 90%;
                border-collapse: collapse;
                background-color: white;
                border: 1px solid rgb(28,154,173);
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }

            #div-2 #viewevents-form th {
                background-color: rgb(28,154,173);
                color: white;
                padding: 12px;
                font-size: 14px;
                text-align: left;
            }

            #div-2 #viewevents-form td {
                padding: 12px;
                color: rgb(28,154,173);
                border-bottom: 1px solid #eee;
            }
            #div-2 #viewevents-form tr:nth-child(even) td {
                background-color: rgba(28,154,173,0.08);
            }

            #div-2 #viewevents-form tr:hover td {
                background-color: rgba(28,154,173,0.2);
            }

            #div-2 #viewevents-form th:first-child {
                border-top-left-radius: 10px;
            }
            #div-2 #viewevents-form th:last-child {
                border-top-right-radius: 10px;
            }



            #div-2 #update_live_form table {
                /* position: absolute; */
                /* top: 0; */
                margin-left: 0px;
                border-collapse: collapse;
                table-layout: fixed;
                width: 50%;
            }

            #div-2 #update_live_form th {
                background-color: rgb(28, 154, 173);
                color: white;
                padding: 10px;
                font-size: 14px;
            }

            #div-2 #update_live_form td {
                padding: 10px;
            }

            #div-2 #update_live_form th, td {            
                text-align: left;
                vertical-align: middle;
            }

            #div-2 #update_live_form input, #div-2 #update_live_form select {
                width: 100%;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                outline: none;
                box-sizing: border-box; 
                height: 36px;
                transition: 0.3s;
            }

            #div-2 #update_live_form input:focus, #div-2 #update_live_form select:focus {
                border-color: rgb(28, 154, 173);
                box-shadow: 0 0 5px rgb(28, 154, 173);
                background-color: rgba(111, 158, 190, 0.445);
            }

            #div-2 #update_live_form input[type="file"] {
                padding: 4px;
            }

            #div-2 #update_live_form #submit {
                position: relative;
                margin-top: 10px;
                bottom: -400px;
                margin-left: 470px;
                width:20%;
                padding: 10px;
                background:rgba(30, 158, 177, 0.788)   ;
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            #div-2 #update_live_form #submit:hover {
                background:rgb(28, 154, 173);
                transform: scale(1.02);
            }   

            .blur_bg{
                filter: blur(3px);
                pointer-events: none;
            }

        </style>    

    </head>

    <body>
        <div id="main-container">

            <header>
                <h1>Admin Dashboard</h1>

                <ul id="container">

                    <li id="li-1">
                        Activity<i class="fa-solid fa-angle-down"></i>
                        <ul id="content-1">
                            <li id="addevents"> Add Events </li>
                            <li id="viewevents"> View Events </li>

                        </ul>
                    </li>
                    
                    <li>
                        User<i class="fa-solid fa-angle-down"></i>
                        <ul id="content-2">
                            <li id="profile">Profile <i class="fa-solid fa-user"></i></li>
                            <li id="logout">logout <i class="fa-solid fa-arrow-right-from-bracket"></i></li>
                        </ul>
                    </li>

                    <li id="us_list">
                        User list
                    </li>

                </ul>

            </header>

            <div id="div-1">
                
            </div>
            
            <div id="div-2">
              
            </div> 

        </div>  

     
          
        

        <script src="js/jquery-4.0.0.min.js">
           
        </script>

        <script src="js/admin.js">

        </script>

    </body>
</html>
