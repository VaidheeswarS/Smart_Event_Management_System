            body{
                margin: 0;
                padding: 0;
                background-color: rgb(156, 249, 218);
            }

            #main-container{
                background-color: white;
                display: flex;
                flex-direction: column;
                min-height: 665px;

            }

            header{
                flex: 2;
                background-color: rgb(247, 243, 243);
            }

            #div-1{
                flex: 1.5;
                background-color: rgb(28, 154, 173);
            }

            #div-2{
                flex: 2;
                background-color: white;
            }

            footer{
                flex: 2;
                background-color: white;
            }
            #content-1, #content-2{
                display: none;
            }

            #container > ul> li{
                display: inline-block;
            }
            
            #li-1:hover #content-1{
                display: block;
            }

            #li-2:hover #content-2{
                display: block;
            }

            #container{
                position: absolute;
                top: 40px;
                height: 100px;
                left: 900px;
            }

            #content-1{

                position: absolute;
                top: 40px;
                left: 0px;
            }

            #content-2{

                position: absolute;
                top: 40px;
                left: 130px;
            }


            #content-1 > li, #content-2 > li{
                display: block;
                height: 25px;   
                padding: 7px 35px 7px 7px;
                background-color: white;
                list-style-type: none;
                border: 0.5px solid #ccc;
                border-left: none;
                border-right: none;
                border-top: none;


            }
            #content-1 > li a, #content-2, li a{
                text-decoration: none;
                text-align: center; 
                color: grey;
                /* font-size: large; */
                font-family: "Google Sans", sans-serif;


            }
            #content-1 > li a:hover, #content-2, li a:hover{
                color: rgb(28, 154, 173);
            }

            #container > ul{
                margin: 0;
                padding: 0;
                width: 200px;
                height: 50px;
                display: flex;
                flex-direction: row;
                /* justify-content: space-evenly; */
                align-items: center;

            }

            a{
                font-family: "Google Sans", sans-serif;
                color: rgb(28, 154, 173);
                text-decoration: none;
            }

            #container > ul >li{
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 50px;
                flex: 1;
                background-color: white;
                cursor: pointer;
                border: 3px solid white;
                border-bottom: none;
                border-left:none ;
                border-right:none;
            }
            #container > ul >li:hover{
                border-top-color: rgb(28, 154, 173);
            }

            #container > ul > li >a{
                text-align: center;
                color: gray;
                text-decoration: none;
               font-family: "Google Sans", sans-serif;

            }

            #container > ul > li >a:hover{
                color: rgb(28, 154, 173);
            }

            h1{
                position: absolute;
                left: 50px;
                top: 30px;
                color: rgb(31, 171, 193);
                cursor: pointer;
                font-family: "Google Sans", sans-serif;

            }
            h1:hover{
                color: black;
            }


            #new{

                margin-top: -35px;
                flex: 1.5;
                width: 80%;
                background-color:white;
                align-self: center;
                border-top-left-radius: 7px;
                border-top-right-radius: 7px;
                
            }
            #div-2{
                border: 0.5px solid #e6e5e5;
                border-left: none;
                border-right: none;
                border-top: none;
