<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>


        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-image: url("images/bookevents.jpg");
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            table {
                width: 85%;
                max-width: 900px;
                border-collapse: collapse;
                backdrop-filter:blur(15px);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            }

            th {
                background: #ffffff7d;
                color:white;
                padding: 12px;
                text-align: center;
                font-size: 14px;
            }

            td {
                padding: 12px;
                text-align: center;
                color: white;
                text-shadow: 2px 2px 2px black;
            }

            button {
                padding: 6px 12px;
                background: #ff6b6b;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #e55050;
                transform: scale(1.05);
            }

        </style>
    </head>


    <body>
    
        <table>
            <tr>
                <th>Event.No</th>
                <th>Event Name</th>
                <th>Event Date</th>
                <th>Event Location</th>
                <th>Cancel Event</th>
            </tr>
           
        </table>






        <script src="js/jquery-4.0.0.min.js">

        </script>

        <script src="js/booked_events.js">

        </script>

    </body>
</html>
