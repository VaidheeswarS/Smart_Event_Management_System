            body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* TABLE */
table {
    width: 85%;
    max-width: 900px;
    border-collapse: collapse;
    background-color: white;

    border: 1px solid rgb(28,154,173);
    border-radius: 10px;
    overflow: hidden;

    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* HEADER */
th {
    background-color: rgb(28,154,173);
    color: white;
    padding: 12px;
    font-size: 14px;
    text-align: center;
}

/* ROWS */
td {
    padding: 12px;
    text-align: center;
    color: rgb(28,154,173);
    border-bottom: 1px solid #eee;
}

/* ALTERNATE ROW COLOR */
tr:nth-child(even) td {
    background-color: rgba(28,154,173,0.08);
}

/* HOVER EFFECT */
tr:hover td {
    background-color: rgba(28,154,173,0.2);
}

/* BUTTON */
button {
    padding: 6px 12px;
    background-color: rgb(28,154,173);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    /* transition: 0.3s; */
}

/* BUTTON HOVER */
button:hover {
    background-color: white;
    color: rgb(28,154,173);
    border: 1px solid rgb(28,154,173);
    /* transform: scale(1.05); */
}

        </style>
    </head>


    <body>
    
        <table>
            <tr>
                <th>Event.No</th>
                <th>Event Name</th>
                <th>Event Date</th>
                <th>Event Location</th>
                <th>Cancel Event</th>
            </tr>
           
        </table>

    </body>
