<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        
        <style>
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                padding: 40px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background-color: white;

                border: 1px solid rgb(28,154,173);
                border-radius: 10px;
                overflow: hidden;

                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }

            th {
                background-color: rgb(28,154,173);
                color: white;
                padding: 12px;
                font-size: 14px;
                text-align: left;
            }

            td {
                padding: 12px;
                color: rgb(28,154,173);
                border-bottom: 1px solid #eee;
            }
            tr:nth-child(even) td {
                background-color: rgba(28,154,173,0.08);
            }

            tr:hover td {
                background-color: rgba(28,154,173,0.2);
            }

            th:first-child {
                border-top-left-radius: 10px;
            }
            th:last-child {
                border-top-right-radius: 10px;
            }

        </style>
    </head>

    <body>
        
        <!-- <p></p> -->

        <table>
            <tr>
                <th>Event Name</th>
                <th>Event Type</th>
                <th>About Event</th>
                <th>Event Day and Time</th>
                <th>Event Location</th>
            </tr>
           
        </table>




        <script src="js/jquery-4.0.0.min.js">

        </script>

        <script src="js/viewevents.js">

        </script>
    </body>
