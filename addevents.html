

        <form id="addevents-form">

            <label for="">Event Name</label>
            <input type="text" name="eventname" id="eventname" required>
            <br>

            <label for="">Event Type</label>
            <select name="eventype" id="eventype" required>
                <option value="Workshop">Workshop</option>
                <option value="Seminar">Seminar</option>
                <option value="Concert">Concert</option>
            </select>
            <br>

            <label for="">About Event</label>
            <input type="text" name="aboutevent" id="aboutevent" required>
            <br>
            
            <label for="">Date and Time</label>
            <input type="datetime-local" id="datetime" required>
            <br>
            
            <label for="">Location</label>
            <input type="text" name="loc" id="loc" required>
            <br>

            <label for="">Event Image</label>
            <input type="file" id="file" required>

            <input type="submit" value="Add Event" id="submit">

        </form>
