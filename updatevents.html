<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <style>

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-image: url("images/updatevents.jpg");
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            form {
                background-color: transparent;
                backdrop-filter: blur(20px);
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px 7px rgba(0,0,0,0.2);
                width: 300px;
            }

            select {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                background-color: transparent;
                border-radius: 8px;
                border: 1px solid white;
                outline: none;
                transition: 0.3s;

            }

            select:focus {
                border-color: white;
                box-shadow: 0 0 5px rgba(237, 237, 249, 0.95);
            }

            #submit {
                width: 100%;
                padding: 10px;
                background:rgb(119, 195, 242);
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            #submit:hover {
                background: rgba(61, 177, 250, 0.701);
                transform: scale(1.05);
            }

        </style>
    

    </head>

    <body>
        
        <form action="#">

            <select name="" id="select">
                <!-- <option id="options"></option> -->
            </select>

            <input type="submit" name="submit" id="submit">
        </form>


        <script src="js/jquery-4.0.0.min.js">

        </script>

        <script src="js/update.js">

        </script>
    </body>
</html>
