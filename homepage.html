        <section>
            <input type="text" name="search" id="search" placeholder="Search Events">
            <button id="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
            <select id="filter">Filter
                <option value="All">All</option>

            <button id="logout">
                logout 
                <i class="fa-solid fa-arrow-right-from-bracket" id="out"></i>

            </button>

        </section>

        <article>
        
            <div id="user_nav">
                <ul>
                    <li id="view">View</li>
                    <li id="book">Booked events</li>
