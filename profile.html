<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


        <style>
            body{
                margin: 0;
                padding: 0;
                min-height: 650px;
                display: flex;
                flex-direction: row;
                justify-content: space-evenly;
                align-items: center;
                flex-wrap: wrap;
            }

            a{
                height: 80px;
                width: 120px;
                text-decoration: none;
                color: rgb(28, 154, 173);
                border: 2px solid rgb(28, 154, 173);
                display: flex;
                flex-direction: column;
                justify-content: space-evenly;
                align-items: center;
                border-radius: 7px;
            }   
            i{
                font-size: larger;
                color: rgb(28, 154, 173);
            }
            #view, #update, #delete{
                transition: transform 0.3s ease;
            }
            #view:hover, #update:hover, #delete:hover{
                transform: scale(1.2);
                /* transition:cubic-bezier(0.075, 0.82, 0.165, 1) */
            }
        </style>
    </head>


    <body>

        <a href="view_user.html" id="view">View
            <i class="fa-solid fa-user"></i>
        </a>
        <a href="update_user.html" id="update">Update
            <i class="fa-solid fa-user-check"></i>
        </a>
        <a href="delete_user.html" id="delete"> Delete
            <i class="fa-solid fa-trash-can"></i>
        </a>
    </body>
</html>
