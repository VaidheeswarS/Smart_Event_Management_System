<!DOCTYPE html>
<html>

    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

        <style>
            body{
                margin: 0;
                font-family: "Google Sans", sans-serif;
                background-color: #f5f5f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            #container{
                display: flex;
                justify-content: center;
                align-items: center;
            }

            #main{
                background-color: white;
                width: 380px;
                padding: 30px;
                display: flex;
                flex-direction: column;
                align-items: center;
                border-radius: 12px;
                border: 2px solid rgb(28,154,173);
                box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            }

            h2{
                color: rgb(28,154,173);
                margin-bottom: 20px;
            }
            .data{
                width: 310px;
                padding: 12px;
                margin-bottom: 12px;
                border: 1px solid #ccc;
                border-radius: 6px;
                outline: none;
            }

            .data:focus{
                border-color: rgb(28,154,173);
                box-shadow: 0 0 5px rgba(28,154,173,0.4);
            }

            span{
                position: relative;
            }

            #eye{
                position: absolute;
                right: 15px;
                top: 5px;
                color: grey;
                cursor: pointer;
            }

            #l-button{
                width: 100%;
                padding: 12px;
                background-color: rgb(28,154,173);
                color: white;
                border-radius: 6px;
                border: none;
                cursor: pointer;
            }

            #l-button:hover{
                background-color: white;
                color: rgb(28,154,173);
                border: 1px solid rgb(28,154,173);
            }

            a{
                text-decoration: none;
                color: rgb(28,154,173);
            }

            p{
                font-size: 13px;
                text-align: center;
            }

            #fb-button, #g-button{
                width: 100%;
                padding: 10px;
                margin-top: 10px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }

            #fb-button{
                background-color:white;
                color:rgb(28,154,173);
                border: 2px solid rgb(28,154,173);
            }

            #g-button{
                background-color: white;
                color: rgb(28,154,173);
                border: 2px solid rgb(28,154,173);
            }

            #fb-button:hover{
                background-color:rgb(28,154,173);
                color: white;
                border: 2px solid rgb(28,154,173);
            }

            #g-button:hover{
                background-color: rgb(28,154,173);
                color: white;
            }

            i{
                font-size: 14px;
            }

    </style>
    </head>

    <body>
        <div id="container">    
            <div id="main">
                <h2 style="text-align: center;">Login</h2>
                 <form action="#" id="form">
                    <input type="text" class="data" name="email" placeholder="Email"> <br>
                    <input type="password" class="data" name="password" placeholder="Password"> 
                    <span><i class="fa-solid fa-eye-slash" id="eye"></i></span>
                
                    <p style="text-align: center;"><a href="" target="_blank" id="forget">Forget password ?</a></p>    
                    <br>
                    <input id="l-button" type="submit" value="Login"><br>
                    <p>Don't have an account? <a href="register.html" target="_self">Signup</a></p>
                    <!-- <br> -->
                    <p>Or</p>

                    <button id="fb-button"><i class="fa-brands fa-facebook"></i>Login with Facebook</button>
                    <br>
                    <button id="g-button"><i class="fa-brands fa-google"></i>Login with Google</button>
                </form>
            </div>
        </div>
        <script src="js/jquery-4.0.0.min.js">

        </script>

        <script src="js/login.js">

        </script>
    </body>
</html>
